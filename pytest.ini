[pytest]
DJANGO_SETTINGS_MODULE = jaytipargal.settings
python_files = tests.py test_*.py *_tests.py
addopts = -ra --strict-markers
filterwarnings =
    ignore::DeprecationWarning
markers =
    e2e: end-to-end browser tests (Playwright); require `playwright install chromium`
    a11y: accessibility audits via axe-core (subset of e2e)
testpaths =
    tests
