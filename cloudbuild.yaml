# ─────────────────────────────────────────────────────────────────────────────
# Cloud Build pipeline — JAYTI personal companion app
# Triggered on every push to `main`.
#
# What it does:
#   1. Build the Docker image
#   2. Push to Artifact Registry
#   3. Run Django deploy-check (smoke-test the image)
#   4. Deploy to Cloud Run (asia-south1 / Mumbai — closest to jaytibirthday.in)
#   5. Collect static files and deploy Firebase Hosting
#
# Required Cloud Build substitution variables (set in trigger config):
#   _REGION          → asia-south1
#   _AR_REPO         → jayti           (Artifact Registry repo name)
#   _SERVICE         → jayti           (Cloud Run service name)
#   _CLOUDSQL_INST   → PROJECT:REGION:INSTANCE  (e.g. jpfinal-c9340:asia-south1:jayti-db)
#
# Secrets pulled from Secret Manager at deploy time (set --update-secrets in the
# gcloud run deploy command below, or pass via --set-env-vars for non-secret values).
# ─────────────────────────────────────────────────────────────────────────────

substitutions:
  _REGION: asia-south1
  _AR_REPO: jayti
  _SERVICE: jayti
  _CLOUDSQL_INST: 'jpfinal-c9340:asia-south1:jayti-db'   # Set in Cloud Build trigger: PROJECT_ID:REGION:INSTANCE_NAME

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  # ── 1. Build Docker image ─────────────────────────────────────────────────
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/app:$COMMIT_SHA
      - --tag
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/app:latest
      - --cache-from
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/app:latest
      - --build-arg
      - BUILDKIT_INLINE_CACHE=1
      - .
    env:
      - DOCKER_BUILDKIT=1

  # ── 2. Push to Artifact Registry ──────────────────────────────────────────
  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/app
    waitFor: [build]

  # ── 3. Django deploy-check (fast smoke test inside the built image) ────────
  - id: deploy-check
    name: $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/app:$COMMIT_SHA
    entrypoint: python
    args:
      - manage.py
      - check
      - --deploy
      - --fail-level
      - WARNING
    env:
      - DEBUG=False
      - SECRET_KEY=ci-build-check-placeholder-not-used-at-runtime
      - ALLOWED_HOSTS=example.com
      - DATABASE_URL=sqlite:////tmp/check.db
      - LOG_TO_FILE=0
      - DJANGO_COLLECTSTATIC=1
    waitFor: [push]

  # ── 4. Deploy to Cloud Run ────────────────────────────────────────────────
  - id: deploy-cloudrun
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/app:$COMMIT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --min-instances=0
      - --max-instances=3
      - --memory=512Mi
      - --cpu=1
      - --concurrency=80
      - --timeout=300
      - --port=8080
      # Cloud SQL Auth Proxy — attach the instance so Django can connect via
      # Unix socket at /cloudsql/PROJECT:REGION:INSTANCE
      - --add-cloudsql-instances=$_CLOUDSQL_INST
      # Non-secret env vars
      - --set-env-vars=PORT=8080,DEBUG=False,LOG_TO_FILE=0,TIME_ZONE=Asia/Kolkata,BIRTH_DATE_DAY=6,BIRTH_DATE_MONTH=2,EMERGENT_MODEL=claude-opus-4-6,GEMINI_MODEL=gemini-1.5-pro,TANGRED_PRIVATE_MEDIA_BACKEND=firebase
      # Secrets are mounted from Secret Manager — add with:
      #   --update-secrets=SECRET_KEY=jayti-secret-key:latest,DATABASE_URL=jayti-db-url:latest,...
      # Uncomment and fill in after creating secrets (see LAUNCH_FIREBASE.md):
      # - --update-secrets=SECRET_KEY=jayti-secret-key:latest
      # - --update-secrets=DATABASE_URL=jayti-database-url:latest
      # - --update-secrets=GEMINI_API_KEY=jayti-gemini-key:latest
      # - --update-secrets=EMERGENT_API_KEY=jayti-emergent-key:latest
      # - --update-secrets=VAPID_PRIVATE_KEY=jayti-vapid-private:latest
      # - --update-secrets=VAPID_PUBLIC_KEY=jayti-vapid-public:latest
      # - --update-secrets=INITIAL_USERNAME=jayti-username:latest
      # - --update-secrets=INITIAL_PASSWORD=jayti-password:latest
      # - --update-secrets=FIREBASE_API_KEY=jayti-firebase-api-key:latest
      # - --update-secrets=FIREBASE_PROJECT_ID=jayti-firebase-project-id:latest
      # - --update-secrets=FIREBASE_APP_ID=jayti-firebase-app-id:latest
      # - --update-secrets=FIREBASE_PRIVATE_KEY=jayti-firebase-private-key:latest
      # - --update-secrets=FIREBASE_CLIENT_EMAIL=jayti-firebase-client-email:latest
    waitFor: [deploy-check]

  # ── 5a. Collect static files ──────────────────────────────────────────────
  - id: collectstatic
    name: $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/app:$COMMIT_SHA
    entrypoint: python
    args:
      - manage.py
      - collectstatic
      - --noinput
      - --clear
    env:
      - DEBUG=False
      - SECRET_KEY=ci-build-check-placeholder-not-used-at-runtime
      - DATABASE_URL=sqlite:////tmp/check.db
      - DJANGO_COLLECTSTATIC=1
      - STATIC_ROOT=/workspace/firebase-hosting/static
    waitFor: [push]

  # ── 5b. Deploy Firebase Hosting ───────────────────────────────────────────
  - id: deploy-hosting
    name: gcr.io/firebase-tools/firebase
    args:
      - deploy
      - --only
      - hosting
      - --project=$PROJECT_ID
    waitFor: [collectstatic, deploy-cloudrun]

images:
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/app:$COMMIT_SHA
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/app:latest

timeout: 1800s   # 30 min — generous for slow cold-build layers
