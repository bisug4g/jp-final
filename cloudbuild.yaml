# ─────────────────────────────────────────────────────────────────────────────
# Cloud Build pipeline — JAYTI personal companion app
# Triggered on every push to `main`.
#
# What it does:
#   1. Build the Docker image (Django / Cloud Run backend)
#   2. Push to Artifact Registry
#   3. Django deploy-check (smoke test)
#   4. Deploy Django to Cloud Run (asia-south1)
#   5. Build React frontend (Vite → firebase-hosting/)
#   6. Install Firebase Functions dependencies
#   7. Deploy Firebase Functions + Firestore rules/indexes
#   8. Deploy Firebase Hosting (React SPA)
#
# Steps 1-4 and 5-8 run in parallel where possible.
# ─────────────────────────────────────────────────────────────────────────────

substitutions:
  _REGION: asia-south1
  _AR_REPO: jayti
  _SERVICE: jayti
  _CLOUDSQL_INST: 'jpfinal-c9340:asia-south1:jayti-db'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  # ── 1. Build Docker image ─────────────────────────────────────────────────
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/app:$COMMIT_SHA
      - --tag
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/app:latest
      - --cache-from
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/app:latest
      - --build-arg
      - BUILDKIT_INLINE_CACHE=1
      - .
    env:
      - DOCKER_BUILDKIT=1

  # ── 2. Push to Artifact Registry ──────────────────────────────────────────
  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/app
    waitFor: [build]

  # ── 3. Django deploy-check ────────────────────────────────────────────────
  - id: deploy-check
    name: $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/app:$COMMIT_SHA
    entrypoint: python
    args:
      - manage.py
      - check
      - --deploy
      - --fail-level
      - WARNING
    env:
      - DEBUG=False
      - SECRET_KEY=ci-build-check-placeholder-not-used-at-runtime
      - ALLOWED_HOSTS=example.com
      - DATABASE_URL=sqlite:////tmp/check.db
      - LOG_TO_FILE=0
      - DJANGO_COLLECTSTATIC=1
    waitFor: [push]

  # ── 4. Deploy to Cloud Run ────────────────────────────────────────────────
  - id: deploy-cloudrun
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/app:$COMMIT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --min-instances=0
      - --max-instances=3
      - --memory=512Mi
      - --cpu=1
      - --concurrency=80
      - --timeout=300
      - --port=8080
      - --add-cloudsql-instances=$_CLOUDSQL_INST
      - --set-env-vars=PORT=8080,DEBUG=False,LOG_TO_FILE=0,TIME_ZONE=Asia/Kolkata,BIRTH_DATE_DAY=6,BIRTH_DATE_MONTH=2,EMERGENT_MODEL=claude-opus-4-6,GEMINI_MODEL=gemini-1.5-pro,TANGRED_PRIVATE_MEDIA_BACKEND=firebase
      # Uncomment after creating secrets in Secret Manager:
      # - --update-secrets=SECRET_KEY=jayti-secret-key:latest
      # - --update-secrets=DATABASE_URL=jayti-database-url:latest
      # - --update-secrets=GEMINI_API_KEY=jayti-gemini-key:latest
      # - --update-secrets=EMERGENT_API_KEY=jayti-emergent-key:latest
      # - --update-secrets=VAPID_PRIVATE_KEY=jayti-vapid-private:latest
      # - --update-secrets=VAPID_PUBLIC_KEY=jayti-vapid-public:latest
      # - --update-secrets=INITIAL_USERNAME=jayti-username:latest
      # - --update-secrets=INITIAL_PASSWORD=jayti-password:latest
      # - --update-secrets=FIREBASE_API_KEY=jayti-firebase-api-key:latest
      # - --update-secrets=FIREBASE_PROJECT_ID=jayti-firebase-project-id:latest
      # - --update-secrets=FIREBASE_APP_ID=jayti-firebase-app-id:latest
      # - --update-secrets=FIREBASE_PRIVATE_KEY=jayti-firebase-private-key:latest
      # - --update-secrets=FIREBASE_CLIENT_EMAIL=jayti-firebase-client-email:latest
    waitFor: [deploy-check]

  # ── 5. Build React frontend ───────────────────────────────────────────────
  # Runs in parallel with the Docker build steps (no dependency on them).
  - id: npm-install-frontend
    name: node:20
    entrypoint: npm
    args: [install]
    dir: frontend
    waitFor: ['-']   # start immediately

  - id: build-frontend
    name: node:20
    entrypoint: npm
    args: [run, build]
    dir: frontend
    env:
      - VITE_FIREBASE_API_KEY=AIzaSyCSrVXiA9_AR_Asp-1h4KeRTWxG0758KA4
      - VITE_FIREBASE_AUTH_DOMAIN=jpfinal-c9340.firebaseapp.com
      - VITE_FIREBASE_PROJECT_ID=jpfinal-c9340
      - VITE_FIREBASE_STORAGE_BUCKET=jpfinal-c9340.firebasestorage.app
      - VITE_FIREBASE_MESSAGING_SENDER_ID=588713240952
      - VITE_FIREBASE_APP_ID=1:588713240952:web:a6bfb6013e3eea6efe008d
      - VITE_API_URL=https://asia-south1-jpfinal-c9340.cloudfunctions.net/api
    waitFor: [npm-install-frontend]

  # ── 6. Install Firebase Functions dependencies ────────────────────────────
  - id: npm-install-functions
    name: node:20
    entrypoint: npm
    args: [install, --legacy-peer-deps]
    dir: firebase-functions
    waitFor: ['-']   # start immediately

  # ── 7. Deploy Firebase Functions + Firestore ──────────────────────────────
  - id: deploy-functions
    name: gcr.io/firebase-tools/firebase
    args:
      - deploy
      - --only
      - functions,firestore
      - --project=$PROJECT_ID
    waitFor: [npm-install-functions]

  # ── 8. Deploy Firebase Hosting ────────────────────────────────────────────
  # Waits for the React build AND Functions deploy (so rewrites are live first).
  - id: deploy-hosting
    name: gcr.io/firebase-tools/firebase
    args:
      - deploy
      - --only
      - hosting
      - --project=$PROJECT_ID
    waitFor: [build-frontend, deploy-functions]

images:
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/app:$COMMIT_SHA
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/app:latest

timeout: 1800s
