name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install ruff
        run: pip install ruff==0.6.9
      - name: Ruff check
        run: ruff check .

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    env:
      DEBUG: "True"
      SECRET_KEY: "ci-test-secret-key"
      DATABASE_URL: ""
      DJANGO_SETTINGS_MODULE: jaytipargal.settings
      LOG_TO_FILE: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libpq-dev build-essential
      - name: Install Python deps
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-django
      - name: Run tests
        run: pytest tests -q --ignore=tests/e2e

  deploy-check:
    name: Django deploy check
    runs-on: ubuntu-latest
    env:
      DEBUG: "False"
      SECRET_KEY: "ci-production-like-secret-key-with-sufficient-entropy-0123456789abcdef"
      ALLOWED_HOSTS: "example.com"
      DJANGO_SETTINGS_MODULE: jaytipargal.settings
      LOG_TO_FILE: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libpq-dev build-essential
      - name: Install Python deps
        run: pip install -r requirements.txt
      - name: Django deploy check
        run: python manage.py check --deploy --fail-level WARNING

  audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit
        run: pip-audit -r requirements.txt -r backend/requirements.txt --ignore-vuln GHSA-000 --strict || true
