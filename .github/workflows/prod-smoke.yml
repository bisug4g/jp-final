name: prod-smoke

on:
  schedule:
    # Every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: prod-smoke
  cancel-in-progress: false

jobs:
  smoke:
    name: Playwright prod smoke (live)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: e2e-node
    env:
      BASE_URL: https://jaytibirthday.in
      CI: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: e2e-node/package-lock.json

      - name: Install Node deps
        run: npm ci || npm install --no-audit --no-fund

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run production smoke tests
        run: npx playwright test prod-smoke.spec.ts

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: prod-smoke-report
          path: |
            e2e-node/playwright-report
            e2e-node/test-results
          retention-days: 14
          if-no-files-found: ignore
