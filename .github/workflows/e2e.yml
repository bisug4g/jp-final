name: e2e

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright (Python, Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DEBUG: "True"
      SECRET_KEY: ci-e2e-secret-key-with-sufficient-entropy-0123456789abcdef
      DJANGO_SETTINGS_MODULE: jaytipargal.settings
      DJANGO_ALLOW_ASYNC_UNSAFE: "true"
      LOG_TO_FILE: "0"
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: ms-playwright-${{ runner.os }}-${{ hashFiles('requirements-dev.txt') }}

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Run E2E tests
        run: |
          pytest tests/e2e -m e2e -q \
            --tracing=retain-on-failure \
            --video=retain-on-failure \
            --screenshot=only-on-failure \
            --output=test-results

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results
          retention-days: 7
          if-no-files-found: ignore
