{% extends 'base.html' %}

{% block title %}Delete Task - JaytiPargal.in{% endblock %}

{% block content %}
<div class="page-shell" style="max-width: 760px;">
    <div class="shell-danger shell-card">
        <div class="shell-card-header">
            <div class="section-heading mb-0"><h3>Delete Task</h3></div>
        </div>
        <div class="shell-card-body text-center">
            <div class="icon-circle mx-auto mb-3"><i class="fas fa-list-check"></i></div>
            <h4 class="mb-3">Delete “{{ task.title }}”?</h4>
            <p class="text-muted">From goal {{ task.goal.title }} · {{ task.get_department_display }}</p>
            <form method="post" class="mt-4">
                {% csrf_token %}
                <div class="shell-actions justify-content-center">
                    <a href="{% url 'goal_detail' task.goal.pk %}" class="btn btn-outline-secondary">Cancel</a>
                    <button type="submit" class="btn btn-danger">Delete Task</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
